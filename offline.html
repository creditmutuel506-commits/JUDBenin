<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JUDBenin — Hors ligne</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 2rem; font-weight: bold; letter-spacing: 3px; color: #e0c080; margin-bottom: 1rem; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    p { color: #aaa; line-height: 1.6; }
    button {
      margin-top: 2rem;
      padding: 0.8rem 2rem;
      background: #e0c080;
      color: #1a1a1a;
      border: none;
      border-radius: 30px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="logo">JUDBenin</div>
  <div class="icon">📶</div>
  <p>Vous êtes hors ligne.<br/>Vérifiez votre connexion et réessayez.</p>
  <button onclick="window.location.reload()">Réessayer</button>
</body>
</html>

                    {p.badge&&<span className={"card-badge "+(p.badge==="Solde"?"solde":"new")}>{p.badge}</span>}
                  </div>
                  <div className="card-body">
                    <div className="card-cat">{p.cat}</div>
                    <div className="card-name">{p.name}</div>
                    <div className="card-footer">
                      <div className="price-wrap">
                        {p.oldPrice&&<span className="price-old">{fmt(p.oldPrice)}</span>}
                        <span className={"price-main"+(p.oldPrice?" sale":"")}>{fmt(p.price)}</span>
                      </div>
                      <button className="add-btn" onClick={()=>addToCart(p)}>+</button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ADMIN */}
      {page==="admin"&&(
        <div className="admin-page">
          {!logged?(
            <div style={{minHeight:"60vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 20px"}}>
              <div style={{background:"var(--blanc)",width:"100%",maxWidth:"420px",boxShadow:"0 20px 60px rgba(130,80,255,0.15)",borderTop:"4px solid #8250ff"}}>
                <div style={{background:"linear-gradient(135deg,#1a0a30,#2d1060)",padding:"28px 30px"}}>
                  <div style={{fontSize:"0.65rem",letterSpacing:"4px",textTransform:"uppercase",color:"#b088ff",fontWeight:600,marginBottom:"8px"}}>🔐 Accès Propriétaire</div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:"1.7rem",fontWeight:700,color:"#c8aaff"}}>Espace Privé</div>
                  <div style={{fontSize:"0.78rem",color:"#9070c0",marginTop:"4px"}}>Réservé au propriétaire de JUDBenin</div>
                </div>
                <div style={{padding:"30px"}}>
                  <div style={{fontSize:"0.68rem",letterSpacing:"2px",textTransform:"uppercase",color:"var(--muted)",fontWeight:600,marginBottom:"8px"}}>Mot de passe</div>
                  <div style={{position:"relative",marginBottom:"8px"}}>
                    <input type={showPw?"text":"password"} placeholder="Entrez votre mot de passe" value={pw}
                      onChange={e=>{setPw(e.target.value);setPwErr(false)}}
                      onKeyDown={e=>e.key==="Enter"&&loginAdmin()}
                      style={{width:"100%",border:`1.5px solid ${pwErr?"var(--danger)":"var(--sable)"}`,background:"var(--creme)",padding:"12px 44px 12px 14px",fontFamily:"'DM Sans',sans-serif",fontSize:"0.9rem",color:"var(--ebene)",outline:"none"}}/>
                    <button onClick={()=>setShowPw(s=>!s)} style={{position:"absolute",right:"12px",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"1.1rem",color:"var(--muted)"}}>{showPw?"🙈":"👁"}</button>
                  </div>
                  {pwErr&&<div style={{color:"var(--danger)",fontSize:"0.75rem",marginBottom:"12px"}}>❌ Mot de passe incorrect.</div>}
                  <button onClick={loginAdmin} style={{width:"100%",background:"#8250ff",color:"#fff",border:"none",padding:"14px",fontFamily:"'DM Sans',sans-serif",fontSize:"0.8rem",fontWeight:700,letterSpacing:"3px",textTransform:"uppercase",cursor:"pointer",marginTop:"8px"}}>🔓 Accéder au catalogue</button>
                  <div style={{textAlign:"center",marginTop:"18px",fontSize:"0.72rem",color:"var(--muted)"}}>🔒 Accès strictement réservé au propriétaire</div>
                </div>
              </div>
            </div>
          ):(
            <>
              <div className="admin-hero">
                <div>
                  <div className="admin-hero-tag">⚙️ Gestion du Catalogue</div>
                  <div className="admin-hero-title">Vos Produits</div>
                  <div className="admin-hero-sub">Modifiez prix et images librement.<br/>Les changements s'affichent instantanément.</div>
                </div>
                <div style={{display:"flex",gap:"12px",flexWrap:"wrap",alignItems:"center"}}>
                  <button className="add-product-btn" onClick={openAdd}>＋ Ajouter un produit</button>
                  <button onClick={logout} style={{background:"rgba(192,57,43,0.15)",color:"#e74c3c",border:"1px solid rgba(192,57,43,0.3)",padding:"12px 20px",fontFamily:"'DM Sans',sans-serif",fontSize:"0.72rem",fontWeight:600,letterSpacing:"2px",textTransform:"uppercase",cursor:"pointer"}}>🔒 Se déconnecter</button>
                </div>
              </div>
              {products.length===0?<div className="admin-empty"><div>📦</div>Catalogue vide !</div>:(
                <div className="admin-grid">
                  {products.map(p=>(
                    <div className="admin-card" key={p.id}>
                      <div className="admin-card-img">{p.img?<img src={p.img} alt={p.name}/>:<div className="admin-card-img-placeholder">👗</div>}</div>
                      <div className="admin-card-body">
                        <div className="admin-card-name">{p.name}</div>
                        <div className="admin-card-meta">
                          <span className="admin-card-cat">{p.cat}</span>
                          {p.badge&&<span style={{fontSize:"0.6rem",background:p.badge==="Solde"?"var(--terre)":"var(--kente)",color:"#fff",padding:"2px 7px",fontWeight:600}}>{p.badge}</span>}
                          <span className="admin-card-price">{fmt(p.price)}</span>
                        </div>
                        <div className="admin-card-actions">
                          <button className="admin-edit-btn" onClick={()=>openEdit(p)}>✎ Modifier</button>
                          <button className="admin-del-btn" onClick={()=>deleteProd(p.id)}>🗑</button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* FIBRE */}
      {page==="fibre"&&(
        <div className="fibre-page">
          <div className="fibre-hero">
            <div>
              <div className="fibre-badge">🌐 Partenaire Celtiis Bénin</div>
              <h1 className="fibre-title">Internet <span>Fibre Optique</span><br/>Ultra-Rapide</h1>
              <p className="fibre-sub">Profitez d'une connexion stable et ultra-rapide avec Celtiis au Bénin. Faites votre demande en ligne et soyez connecté en 48h.</p>
              <div className="fibre-speeds">
                <div><div className="fibre-speed-num">100</div><div className="fibre-speed-label">Mbps max</div></div>
                <div><div className="fibre-speed-num">48h</div><div className="fibre-speed-label">Installation</div></div>
                <div><div className="fibre-speed-num">24/7</div><div className="fibre-speed-label">Support</div></div>
              </div>
            </div>
            <div>
              {OFFRES.map(o=>(
                <div key={o.id} className={"fibre-offer-card"+(o.popular?" popular":"")} onClick={()=>setFibreForm(f=>({...f,offre:o.id}))}>
                  <div className="fibre-offer-icon">{o.icon}</div>
                  <div><div className="fibre-offer-name">{o.name}{o.popular&&<span className="popular-tag">Populaire</span>}</div><div className="fibre-offer-desc">{o.speed}</div></div>
                  <div className="fibre-offer-price"><strong>{o.prix} FCFA</strong><small>/mois</small></div>
                </div>
              ))}
            </div>
          </div>
          <div className="fibre-form-section">
            <div className="fibre-form-header">
              <div className="fibre-form-tag">📋 Formulaire de Demande</div>
              <div className="fibre-form-title">Souscrire à la Fibre Celtiis</div>
              <div className="fibre-form-sub">Remplissez le formulaire et notre équipe vous contactera sous 24h.</div>
            </div>
            <div className="fibre-form-card">
              {!fibreSuccess?(
                <div>
                  <div className="fibre-form-section-title">📶 Choisissez votre offre</div>
                  <div className="offre-grid" style={{marginBottom:"22px"}}>
                    {OFFRES.map(o=>(
                      <div key={o.id} className={"offre-option"+(fibreForm.offre===o.id?" selected":"")} onClick={()=>setFibreForm(f=>({...f,offre:o.id}))}>
                        <div style={{fontSize:"1.4rem",marginBottom:"5px"}}>{o.icon}</div>
                        <div className="offre-option-name">{o.name}</div>
                        <div className="offre-option-speed">{o.speed}</div>
                        <div className="offre-option-price">{o.prix} FCFA</div>
                      </div>
                    ))}
                  </div>
                  <div className="fibre-form-section-title">👤 Informations personnelles</div>
                  <div className="form-row">
                    <div className="form-group"><label className="form-label">Nom {fibreErrors.nom&&<span style={{color:"var(--danger)",fontWeight:400}}>— {fibreErrors.nom}</span>}</label><input className="form-input" name="nom" placeholder="Ex: Adjovi" value={fibreForm.nom} onChange={hfibre} style={fibreErrors.nom?ds():{}} /></div>
                    <div className="form-group"><label className="form-label">Prénom {fibreErrors.prenom&&<span style={{color:"var(--danger)",fontWeight:400}}>— {fibreErrors.prenom}</span>}</label><input className="form-input" name="prenom" placeholder="Ex: Kokou" value={fibreForm.prenom} onChange={hfibre} style={fibreErrors.prenom?ds():{}} /></div>
                  </div>
                  <div className="form-row">
                    <div className="form-group"><label className="form-label">📞 Téléphone {fibreErrors.telephone&&<span style={{color:"var(--danger)",fontWeight:400}}>— {fibreErrors.telephone}</span>}</label><input className="form-input" name="telephone" type="tel" placeholder="+229 01 XX XX XX" value={fibreForm.telephone} onChange={hfibre} style={fibreErrors.telephone?ds():{}} /></div>
                    <div className="form-group"><label className="form-label">✉️ Email (optionnel)</label><input className="form-input" name="email" type="email" placeholder="exemple@gmail.com" value={fibreForm.email} onChange={hfibre}/></div>
                  </div>
                  <div className="form-group"><label className="form-label">Type de client</label><select className="form-select" name="type_client" value={fibreForm.type_client} onChange={hfibre}><option>Particulier</option><option>Entreprise</option><option>Administration</option></select></div>
                  <div className="fibre-form-section-title" style={{marginTop:"18px"}}>🏠 Adresse d'installation</div>
                  <div className="form-group"><label className="form-label">Adresse {fibreErrors.adresse&&<span style={{color:"var(--danger)",fontWeight:400}}>— {fibreErrors.adresse}</span>}</label><input className="form-input" name="adresse" placeholder="Ex: Rue des Cocotiers, N°12" value={fibreForm.adresse} onChange={hfibre} style={fibreErrors.adresse?ds():{}} /></div>
                  <div className="form-row">
                    <div className="form-group"><label className="form-label">Quartier</label><input className="form-input" name="quartier" placeholder="Ex: Cadjehoun" value={fibreForm.quartier} onChange={hfibre}/></div>
                    <div className="form-group"><label className="form-label">Ville</label><select className="form-select" name="ville" value={fibreForm.ville} onChange={hfibre}><option>Cotonou</option><option>Porto-Novo</option><option>Parakou</option><option>Abomey-Calavi</option><option>Autre</option></select></div>
                  </div>
                  <div className="form-group"><label className="form-label">Note (optionnel)</label><textarea className="form-textarea" name="note" placeholder="Informations complémentaires..." value={fibreForm.note} onChange={hfibre}/></div>
                  <button className="fibre-submit-btn" onClick={submitFibre}>🌐 Envoyer ma demande de connexion</button>
                </div>
              ):(
                <div className="fibre-success">
                  <div className="fibre-success-icon">🎉</div>
                  <div className="fibre-success-title">Demande envoyée !</div>
                  <p className="fibre-success-msg">Merci <strong>{fibreForm.prenom} {fibreForm.nom}</strong> !<br/>Notre équipe Celtiis vous contactera sous 24h.</p>
                  <div className="fibre-success-detail">📶 Offre : <strong>{sO&&sO.name} — {sO&&sO.speed}</strong><br/>📞 Contact : <strong>{fibreForm.telephone}</strong><br/>🏠 Adresse : <strong>{fibreForm.adresse}{fibreForm.quartier?", "+fibreForm.quartier:""}, {fibreForm.ville}</strong></div>
                  <button className="fibre-success-close" onClick={()=>setFibreSuccess(false)}>Nouvelle demande</button>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* PRODUCT MODAL */}
      <div className={"pmodal-overlay"+(pModal?" open":"")} onClick={e=>e.target===e.currentTarget&&closePModal()}>
        <div className="pmodal">
          <div className="pmodal-head"><h2>{editProd?"Modifier le produit":"Ajouter un produit"}</h2><button className="pmodal-close" onClick={closePModal}>✕</button></div>
          <div className="pmodal-body">
            <div className="form-label">Photo {prodErrors.img&&<span style={{color:"var(--danger)",fontWeight:400}}>— {prodErrors.img}</span>}</div>
            <div className="img-upload-zone" style={prodErrors.img?ds():{}}>
              <input type="file" accept="image/*" onChange={handleProdImg}/>
              {preview?<img className="preview" src={preview} alt="preview"/>:<><div className="img-upload-icon">📷</div><div className="img-upload-label">Cliquer pour uploader une photo</div></>}
            </div>
            <div className="img-url-sep">— ou entrez une URL —</div>
            <div className="form-group"><input className="form-input" placeholder="https://..." value={prodForm.img&&prodForm.img.startsWith("data:")?"":(prodForm.img||"")} onChange={e=>{setProdForm(f=>({...f,img:e.target.value}));setPreview(e.target.value||null);setProdErrors(er=>({...er,img:""}))}}/></div>
            <div className="form-group"><label className="form-label">Nom {prodErrors.name&&<span style={{color:"var(--danger)",fontWeight:400}}>— {prodErrors.name}</span>}</label><input className="form-input" placeholder="Ex: Boubou Grand Damassé" value={prodForm.name} onChange={e=>{setProdForm(f=>({...f,name:e.target.value}));setProdErrors(er=>({...er,name:""}))}} style={prodErrors.name?ds():{}} /></div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Catégorie</label><select className="form-select" value={prodForm.cat} onChange={e=>setProdForm(f=>({...f,cat:e.target.value}))}><option>Femme</option><option>Homme</option><option>Enfant</option></select></div>
              <div className="form-group"><label className="form-label">Badge</label><div className="badge-row">{["Nouveau","Solde","Aucun"].map(b=>(<div key={b} className="badge-opt" style={prodForm.badge===b?{background:b==="Nouveau"?"var(--kente)":b==="Solde"?"var(--terre)":"var(--ebene)",color:b==="Aucun"?"var(--or)":"#fff",borderColor:"transparent"}:{}} onClick={()=>setProdForm(f=>({...f,badge:b}))}>{b}</div>))}</div></div>
            </div>
            <div className="form-row">
              <div className="form-group"><label className="form-label">Prix FCFA {prodErrors.price&&<span style={{color:"var(--danger)",fontWeight:400}}>— {prodErrors.price}</span>}</label><input className="form-input" type="number" placeholder="Ex: 15000" value={prodForm.price} onChange={e=>{setProdForm(f=>({...f,price:e.target.value}));setProdErrors(er=>({...er,price:""}))}} style={prodErrors.price?ds():{}} /></div>
              <div className="form-group"><label className="form-label">Ancien prix (optionnel)</label><input className="form-input" type="number" placeholder="Ex: 20000" value={prodForm.oldPrice} onChange={e=>setProdForm(f=>({...f,oldPrice:e.target.value}))}/></div>
            </div>
            <button className="save-btn" onClick={saveProd}>{editProd?"✓ Enregistrer les modifications":"＋ Ajouter au catalogue"}</button>
          </div>
        </div>
      </div>

      {/* CART */}
      <div className={"overlay"+(cartOpen?" open":"")} onClick={()=>setCartOpen(false)}/>
      <div className={"cart-panel"+(cartOpen?" open":"")}>
        <div className="cart-header"><h2>Mon Panier</h2><button className="close-btn" onClick={()=>setCartOpen(false)}>✕</button></div>
        <div className="cart-items">
          {cart.length===0?<div className="cart-empty"><div>🛍</div>Votre panier est vide.</div>
          :cart.map(item=>(
            <div className="cart-item" key={item.id}>
              <img src={item.img} alt={item.name}/>
              <div className="cart-item-info">
                <div className="cart-item-cat">{item.cat}</div>
                <div className="cart-item-name">{item.name}</div>
                <div className="cart-item-row">
                  <div className="qty-ctrl">
                    <button className="qty-btn" onClick={()=>changeQty(item.id,-1)}>−</button>
                    <span className="qty-num">{item.qty}</span>
                    <button className="qty-btn" onClick={()=>changeQty(item.id,1)}>+</button>
                  </div>
                  <span className="cart-item-price">{fmt(item.price*item.qty)}</span>
                </div>
                <button className="remove-item" onClick={()=>changeQty(item.id,-item.qty)}>Supprimer</button>
              </div>
            </div>
          ))}
        </div>
        {cart.length>0&&(
          <div className="cart-footer">
            <div className="cart-total"><span>Total</span><strong>{fmt(total)}</strong></div>
            <button className="checkout-btn" onClick={openOrder}>Commander maintenant →</button>
          </div>
        )}
      </div>

      {/* ORDER MODAL */}
      <div className={"modal-overlay"+(orderOpen?" open":"")} onClick={e=>e.target===e.currentTarget&&closeOrder()}>
        <div className="modal">
          {!orderSuccess?(
            <div>
              <div className="modal-head"><div><h2>Formulaire de Commande</h2><p>Remplissez vos informations pour finaliser</p></div><button className="modal-close" onClick={closeOrder}>✕</button></div>
              <div className="modal-body">
                <div className="order-summary">
                  <div className="order-summary-title">📦 Récapitulatif</div>
                  {cart.map(item=>(<div className="order-summary-item" key={item.id}><span>{item.name}</span><span className="order-summary-qty">x{item.qty}</span><span style={{fontWeight:600}}>{fmt(item.price*item.qty)}</span></div>))}
                  <div className="order-summary-total"><span>Total</span><strong>{fmt(total)}</strong></div>
                </div>
                <div className="o-section-title">👤 Informations personnelles</div>
                <div className="form-row">
                  <div className="form-group"><label className="form-label">Nom {errors.nom&&<span style={{color:"var(--danger)",fontWeight:400}}>— {errors.nom}</span>}</label><input className="form-input" name="nom" placeholder="Ex: Koffi" value={form.nom} onChange={hf} style={errors.nom?ds():{}} /></div>
                  <div className="form-group"><label className="form-label">Prénom {errors.prenom&&<span style={{color:"var(--danger)",fontWeight:400}}>— {errors.prenom}</span>}</label><input className="form-input" name="prenom" placeholder="Ex: Ama" value={form.prenom} onChange={hf} style={errors.prenom?ds():{}} /></div>
                </div>
                <div className="form-group"><label className="form-label">📞 Téléphone {errors.telephone&&<span style={{color:"var(--danger)",fontWeight:400}}>— {errors.telephone}</span>}</label><input className="form-input" name="telephone" type="tel" placeholder="+229 01 XX XX XX" value={form.telephone} onChange={hf} style={errors.telephone?ds():{}} /></div>
                <div className="o-section-title" style={{marginTop:"16px"}}>🏠 Adresse de livraison</div>
                <div className="form-group"><label className="form-label">Adresse {errors.adresse&&<span style={{color:"var(--danger)",fontWeight:400}}>— {errors.adresse}</span>}</label><input className="form-input" name="adresse" placeholder="Ex: Rue des Cocotiers, N°12" value={form.adresse} onChange={hf} style={errors.adresse?ds():{}} /></div>
                <div className="form-group"><label className="form-label">Quartier / Ville</label><input className="form-input" name="quartier" placeholder="Ex: Cadjehoun, Cotonou" value={form.quartier} onChange={hf}/></div>
                <div className="form-group"><label className="form-label">Note (optionnel)</label><textarea className="form-textarea" name="note" placeholder="Instructions, taille souhaitée..." value={form.note} onChange={hf}/></div>
                <button className="submit-btn" onClick={submitOrder}>✓ Confirmer ma commande</button>
              </div>
            </div>
          ):(
            <div className="success-box">
              <div className="success-icon">🎉</div>
              <div className="success-title">Commande confirmée !</div>
              <p className="success-msg">Merci <strong>{form.prenom} {form.nom}</strong> !<br/>Nous vous contacterons très bientôt.</p>
              <div className="success-detail">📞 Au : <strong>{form.telephone}</strong><br/>🏠 Livraison : <strong>{form.adresse}{form.quartier?", "+form.quartier:""}</strong><br/>💰 Total : <strong>{fmt(total)}</strong></div>
              <button className="success-close" onClick={closeOrder}>Retour à la boutique</button>
            </div>
          )}
        </div>
      </div>

      {/* CONTACT */}
      <div className="contact-section">
        <div className="contact-title">Contactez-nous</div>
        <div className="contact-sub">Disponibles pour vous aider</div>
        <div className="contact-grid">
          <div className="contact-card">
            <div className="contact-icon">📞</div>
            <div><div className="contact-label call">Appel téléphonique</div><span className="contact-num"><a href="tel:+22901433012770">+229 01 43 30 12 77</a></span></div>
          </div>
          <div className="contact-card whatsapp">
            <div className="contact-icon">💬</div>
            <div>
              <div className="contact-label wa">WhatsApp</div>
              <span className="contact-num"><a href="https://wa.me/22901482242470" target="_blank" rel="noreferrer">+229 01 48 22 42 47</a></span>
              <span className="contact-num"><a href="https://wa.me/22901523786270" target="_blank" rel="noreferrer">+229 01 52 37 86 27</a></span>
            </div>
          </div>
        </div>
      </div>
      <footer className="footer">
        <div className="footer-logo">JUDBenin</div>
        <div className="footer-text">© 2026 JUDBenin · Cotonou, Bénin · Tous droits réservés</div>
        <span style={{fontSize:"1.1rem"}}>🇧🇯</span>
      </footer>
      <div className={"toast"+(toast?" show":"")}>{toast}</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
